<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhyme Write</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Inlined SVG background for animation control -->
        <svg class="bg-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
            <defs>
                <style>
                    .cls-1 { fill: #f50; }
                    .cls-3 { font-size: 16.3px; letter-spacing: -.04em; }
                    .cls-3, .cls-4, .cls-5, .cls-6 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; }
                    .cls-4 { font-size: 120px; letter-spacing: -.04em; }
                    .cls-7, .cls-8 { fill: #fff; }
                    .cls-8 { mix-blend-mode: screen; opacity: .5; }
                    .cls-5 { font-size: 22.2px; letter-spacing: -.04em; }
                    .cls-9 { stroke: #fff; stroke-width: 2px; }
                    .cls-9, .cls-10 { fill: none; stroke-miterlimit: 10; }
                    .cls-6 { font-size: 11px; letter-spacing: -.04em; }
                    .cls-10 { stroke: #000; stroke-width: 3px; }
                </style>
            </defs>
            <g>
                <rect class="cls-1" x="-23" y="-4" width="1967" height="1128"/>
                <g id="svg-spotlight">
                    <path class="cls-8" d="M1555-15h-65.76l-931.54,697.11,1.29.08c-28.61,15.75-44.67,33.43-44.67,52.11,0,65.89,199.54,119.3,445.68,119.3s444.88-53.2,445.67-118.91h0S1555-15,1555-15Z"/>
                    <path class="cls-8" d="M365-14.61h65.76s931.54,697.11,931.54,697.11l-1.29.08c28.61,15.75,44.67,33.43,44.67,52.11,0,65.89-199.54,119.3-445.68,119.3-245.65,0-444.88-53.2-445.67-118.91h0S365-14.61,365-14.61Z"/>
                </g>
                <g id="svg-ui" style="opacity: 0; transition: opacity 1s ease;">
                    <ellipse class="cls-7" cx="960" cy="734.31" rx="445.68" ry="119.3"/>
                    <line class="cls-10" x1="569.5" y1="749.33" x2="1170.5" y2="749.33"/>
                    <rect class="cls-10" x="1190.5" y="700.09" width="160" height="48.17"/>
                    <text class="cls-5" transform="translate(1214.91 730.57) scale(1.4 1)"><tspan x="0" y="0">Rhymin’</tspan></text>
                </g>
                <g id="svg-title" style="opacity: 0; transition: opacity 1s ease;">
                    <text class="cls-4" text-anchor="middle" transform="translate(960 223.65) scale(1.4 1)"><tspan x="0" y="0">Rhyme Write</tspan></text>
                    <text class="cls-3" text-anchor="middle" transform="translate(960 272.39) scale(1.4 1)"><tspan x="0" y="0">Let's have fun discovering unexpected rhymes.</tspan></text>
                    <text class="cls-6" transform="translate(1464.38 515.55) rotate(90) scale(1.4 1)"><tspan x="0" y="0">It supports English and Japanese.</tspan></text>
                </g>
            </g>
        </svg>

        <!-- Floating Mic (Permanent) -->
        <img src="mic.svg" class="floating-mic" id="floating-mic" alt="mic">

        <!-- Loading Screen (Just for fading overlay if needed, currently transparent) -->
        <div id="loading-screen" class="loading-screen">
            <div style="position:absolute;bottom:20%;left:50%;transform:translateX(-50);color:#fff;font-family:'Bricolage Grotesque',sans-serif;font-size:1.2rem;opacity:0.7;">Loading dictionary...</div>
        </div>

        <!-- Title Screen Start Button -->
        <img src="start.svg" id="start-btn" class="start-btn hidden" alt="GAME START">

        <!-- Game Elements -->
        <div id="round-info" class="round-info hidden">ROUND 1 <span class="len-target">(3文字)</span></div>
        
        <div id="countdown-container" class="countdown-container hidden">
            <div class="timer-label-top">残り</div>
            <div id="countdown-timer" class="countdown-number">30</div>
            <div class="timer-label-bottom">秒</div>
        </div>
        
        <div id="quiz-prompt-container" class="quiz-prompt-container hidden">
            <div id="quiz-prompt" class="quiz-prompt"></div>
        </div>
        <input type="text" id="word-input" class="word-input hidden" maxlength="20" autocomplete="off" placeholder="">
        
        <div id="result-display" class="result-display hidden">
            <span id="result-word" class="result-word"></span>
        </div>
        
        <button id="rhymin-btn" class="rhymin-btn hidden" aria-label="Rhymin'"></button>
        
        <span id="match-info" class="match-info hidden"></span>
    </div>

    <!-- Audio Element -->
    <audio id="bgm" src="kontraa-basement-hiphop-music-21883.mp3" loop preload="auto"></audio>

    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <script src="js/dictionary.js"></script>
    <script src="js/rhyme-engine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
